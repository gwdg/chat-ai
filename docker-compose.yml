services:
  front:
    image: chat-ai-front:latest
    build: ./front
    network_mode: "host"
    volumes:
      - ./front:/usr/src/app
      - /usr/src/app/node_modules
    secrets:
      - front
    restart: on-failure

  back:
    image: chat-ai-back:latest
    build: ./back
    network_mode: "host"
    volumes:
      - ./back:/usr/src/app
      - /usr/src/app/node_modules
    secrets:
      - back
    restart: on-failure

  agentic:
    image: chat-ai-agentic:latest
    build: ./agentic
    network_mode: "host"
    volumes:
      - ./agentic:/usr/src/app
    environment:
      - AGENTIC_ENVIRONMENT=development
      - AGENTIC_HOST=0.0.0.0
      - AGENTIC_PORT=8001
      - AGENTIC_CORS_ALLOW_ORIGINS=http://localhost:3000,http://localhost:5173
      # Switch to false (and set AGENTIC_SLURM_BASE_URL) once running on HPC.
      - AGENTIC_SLURM_MOCK_MODE=true
      - AGENTIC_SLURM_BASE_URL=http://localhost:6820
    restart: on-failure

secrets:
  front:
    file: ./secrets/front.json
  back:
    file: ./secrets/back.json